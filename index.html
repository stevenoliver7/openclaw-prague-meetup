<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Prague Meetup #1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; padding: 40px 0 20px; }
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #e94560);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s linear infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .tagline { font-size: 1.5rem; color: #ff6b6b; margin-bottom: 10px; font-weight: 600; letter-spacing: 0.5px; }
        .subtitle { font-size: 1.1rem; color: #a0a0a0; margin-bottom: 20px; }
        section { margin: 80px 0; background: rgba(255,255,255,0.03); padding: 50px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        section:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(233, 69, 96, 0.3); }
        section h3 { font-size: 1.8rem; margin-bottom: 20px; color: #ff6b6b; }
        section p { color: #d0d0d0; margin-bottom: 18px; font-size: 1.1rem; line-height: 1.8; }
        section ul { list-style: none; margin-bottom: 18px; }
        section li { margin: 12px 0; color: #d0d0d0; font-size: 1.1rem; line-height: 1.8; }
        section li strong { color: #fff; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin: 10px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(233, 69, 96, 0.6); }
        .date-badge { display: inline-block; padding: 10px 28px; border: 1px solid rgba(233, 69, 96, 0.5); border-radius: 50px; color: #ff6b6b; font-weight: 700; font-size: 1.2rem; margin-bottom: 25px; box-shadow: 0 0 20px rgba(233, 69, 96, 0.3); letter-spacing: 1px; animation: pulse-border 3s infinite alternate; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 10px rgba(233, 69, 96, 0.2); } 100% { box-shadow: 0 0 25px rgba(233, 69, 96, 0.6); border-color: rgba(233, 69, 96, 0.8); } }
        .svg-container { text-align: center; margin: 20px 0; display: flex; justify-content: center; }

        .bio-card { display: flex; flex-direction: column; gap: 20px; align-items: center; text-align: left; }
        @media (min-width: 600px) {
            .bio-card { flex-direction: row; align-items: flex-start; }
            h1 { font-size: 4rem; }
        }
        .bio-photo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid #e94560; flex-shrink: 0; box-shadow: 0 0 20px rgba(233, 69, 96, 0.4); transition: transform 0.4s ease, box-shadow 0.4s ease; }
        .bio-photo:hover { transform: scale(1.08) rotate(5deg); box-shadow: 0 0 35px rgba(233, 69, 96, 0.7); }
        .bio-card ul { margin-top: 10px; }
        .bio-card li strong { color: #ff6b6b; }



        details {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 15px 20px;
            transition: all 0.3s ease;
        }
        details[open] {
            background: rgba(233, 69, 96, 0.05);
            border-color: rgba(233, 69, 96, 0.3);
        }
        details summary {
            font-weight: 700;
            cursor: pointer;
            color: #ff6b6b;
            font-size: 1.15rem;
            outline: none;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        details summary::-webkit-details-marker {
            display: none;
        }
        details summary::after {
            content: "+";
            color: #e94560;
            font-size: 1.5rem;
            line-height: 1;
            transition: transform 0.3s;
        }
        details[open] summary::after {
            content: "−";
            transform: rotate(180deg);
        }
        details p {
            margin-top: 15px !important;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }


        footer { text-align: center; padding: 30px; color: #666; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }
        footer a { color: #e94560; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">

        <div class="hero">
            <div class="svg-container">
<!-- 1. Hero Mascot: Trdelnik Stacked Rings Cat -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="240" height="240">
  <style>
    .eye { animation: blink 4s steps(1) infinite; }
    @keyframes blink { 0%, 90% { transform: scaleY(1); } 95% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
  </style>
  <!-- Cat head -->
  <g transform="translate(190, 80) scale(14)" shape-rendering="crispEdges">
    <path fill="#e94560" d="M5,10 h4 v-4 h4 v4 h4 v-4 h4 v4 h4 v10 h-20 Z" />
    <path fill="#ff6b6b" d="M7,12 h2 v2 h-2 Z M17,12 h2 v2 h-2 Z M12,16 h2 v2 h-2 Z" />
    <g class="eye">
      <rect fill="#fff" x="6" y="12" width="4" height="4" />
      <rect fill="#a0a0a0" x="7" y="13" width="2" height="2" />
      <rect fill="#fff" x="16" y="12" width="4" height="4" />
      <rect fill="#a0a0a0" x="17" y="13" width="2" height="2" />
    </g>
  </g>
  <!-- Trdelnik rings -->
  <rect x="200" y="360" width="400" height="130" rx="65" fill="#E08E36" stroke="#5A2E0E" stroke-width="12"/>
  <rect x="220" y="470" width="360" height="130" rx="65" fill="#C3772A" stroke="#5A2E0E" stroke-width="12"/>
  <rect x="250" y="580" width="300" height="130" rx="65" fill="#A86321" stroke="#5A2E0E" stroke-width="12"/>
  <!-- Cat legs -->
  <g transform="translate(190, 680) scale(14)" shape-rendering="crispEdges">
    <path fill="#fff" d="M6,21 h2 v4 h-2 Z M11,21 h2 v4 h-2 Z M16,21 h2 v4 h-2 Z M21,21 h2 v4 h-2 Z" />
  </g>
</svg>
            </div>
            <div class="date-badge" id="hero-date"></div>
            <h1 id="hero-title"></h1>
            <div class="tagline" id="hero-tagline"></div>
            <div class="subtitle" id="hero-subtitle"></div>
        </div>

        <section id="event-details">
            <h3 id="event-title"></h3>
            <p id="event-desc"></p>
            <ul style="margin-bottom: 30px;">
                <li id="event-loc"></li>
                <li id="event-time"></li>
            </ul>
            <h4 id="agenda-title" style="color: #ff6b6b; font-size: 1.4rem; margin-bottom: 15px;"></h4>
            <ul id="agenda-list" style="border-left: 2px solid #e94560; padding-left: 20px; list-style: none;">
            </ul>
        </section>

        <section id="speakers">
            <div class="svg-container">
<!-- 2. Speakers: Geometric Silhouettes -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="160" height="120">
  <style>
    .speaker-geo { fill: none; stroke: #a0a0a0; stroke-width: 2; }
    .speaker-geo-main { fill: none; stroke: #fff; stroke-width: 3; }
    .question-mark { fill: #e94560; font-family: monospace; font-size: 32px; font-weight: bold; transform-origin: 100px 50px; animation: spin-q 4s ease-in-out infinite; }
    .speaker-group { animation: assemble 2s ease-out forwards; }
    @keyframes spin-q {
      0%, 10% { transform: rotate(0deg); }
      40%, 60% { transform: rotate(180deg); }
      90%, 100% { transform: rotate(360deg); }
    }
    @keyframes assemble {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .pulse-grid { stroke: #333; stroke-width: 1; stroke-dasharray: 2 4; }
  </style>
  <g class="pulse-grid">
    <line x1="0" y1="75" x2="200" y2="75"/>
    <line x1="100" y1="0" x2="100" y2="150"/>
  </g>
  <g class="speaker-group" style="animation-delay: 0.2s;">
    <circle class="speaker-geo" cx="50" cy="65" r="15"/>
    <rect class="speaker-geo" x="35" y="90" width="30" height="60"/>
    <line class="speaker-geo" x1="35" y1="90" x2="15" y2="120"/>
    <line class="speaker-geo" x1="65" y1="90" x2="85" y2="120"/>
  </g>
  <g class="speaker-group" style="animation-delay: 0.4s;">
    <circle class="speaker-geo" cx="150" cy="65" r="15"/>
    <rect class="speaker-geo" x="135" y="90" width="30" height="60"/>
    <line class="speaker-geo" x1="135" y1="90" x2="115" y2="120"/>
    <line class="speaker-geo" x1="165" y1="90" x2="185" y2="120"/>
  </g>
  <g class="speaker-group" style="animation-delay: 0s;">
    <circle class="speaker-geo-main" cx="100" cy="45" r="22"/>
    <rect class="speaker-geo-main" x="75" y="75" width="50" height="75"/>
    <line class="speaker-geo-main" x1="75" y1="75" x2="40" y2="110"/>
    <line class="speaker-geo-main" x1="125" y1="75" x2="160" y2="110"/>
    <text x="100" y="56" class="question-mark" text-anchor="middle">?</text>
  </g>
</svg>
            </div>
            <h3 id="speakers-title" style="text-align: center;"></h3>
            <p id="speakers-desc" style="text-align: center;"></p>
            <div style="text-align: center;"><a href="#" id="speakers-btn" class="btn"></a></div>
        </section>

        <section id="host">
            <h3 id="host-title"></h3>
            <div class="bio-card">
                <img src="daniel_vecera_headshot.png" alt="Daniel Vecera" class="bio-photo">
                <div>
                    <p id="host-bio"></p>

                    <p id="host-list-title" style="margin-top: 15px;"></p>
                    <ul id="host-list">
                    </ul>


                </div>
            </div>
        </section>

        <section id="co-organize" style="text-align: center;">
            <div class="svg-container">
<!-- 3. Co-Organizer: Comic Sketch 'YOU?' -->
<svg width="150" height="150" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sketch { fill: none; stroke: #fff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawO 2s ease-out forwards; }
    .sign { stroke: #ff6b6b; stroke-width: 2; fill: none; stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawO 1.5s ease-out 1s forwards; }
    .text { fill: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: bold; opacity: 0; animation: fade 0.5s forwards 2.5s; }
    .arm { transform-origin: 90px 80px; animation: wave 2s infinite 2.5s; }
    @keyframes drawO { to { stroke-dashoffset: 0; } }
    @keyframes fade { to { opacity: 1; } }
    @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-20deg); } }
  </style>
  <g>
    <!-- Head -->
    <path class="sketch" d="M 90,30 C 105,30 110,50 90,60 C 70,50 75,30 90,30 Z" />
    <!-- Body -->
    <path class="sketch" d="M 90,60 C 88,90 92,110 90,130" />
    <!-- Waving Arm -->
    <g class="arm">
      <path class="sketch" d="M 90,80 C 60,70 40,40 30,20" />
    </g>
    <!-- Sign Arm & Sign -->
    <path class="sketch" d="M 90,90 C 120,100 130,120 140,110" />
    <path class="sign" d="M 120,60 L 175,55 L 170,110 L 115,115 Z" />
    <text x="125" y="95" class="text" transform="rotate(-5 125 95)">YOU?</text>
    <!-- Legs -->
    <path class="sketch" d="M 90,130 C 75,150 60,170 50,170 M 90,130 C 100,150 110,170 125,160" />
  </g>
</svg>
            </div>
            <h3 id="coorg-title"></h3>
            <p id="coorg-desc"></p>
        </section>

        <section id="venue" style="border-color: #ffc107;">
            <div class="svg-container">
<!-- 4. Venue: Geometric -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="160" height="120">
  <style>
    .venue-base { fill: none; stroke: #fff; stroke-width: 2; }
    .venue-roof { fill: none; stroke: #a0a0a0; stroke-width: 2; }
    .venue-door { fill: none; stroke: #e94560; stroke-width: 2; }
    .venue-window { fill: none; stroke: #a0a0a0; stroke-width: 1.5; }
    .venue-q-group { animation: float-q 3s ease-in-out infinite; }
    .venue-q-circle { fill: none; stroke: #ff6b6b; stroke-width: 2; }
    .venue-q-text { fill: #e94560; font-family: monospace; font-size: 24px; font-weight: bold; }
    .venue-build { stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw-building 3s ease-out forwards; }
    @keyframes float-q {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes draw-building {
      100% { stroke-dashoffset: 0; }
    }
    .grid { stroke: #2a2a3e; stroke-width: 1; }
  </style>
  <g class="grid">
    <line x1="0" y1="130" x2="200" y2="130"/>
    <line x1="100" y1="0" x2="100" y2="150" stroke-dasharray="2 4"/>
  </g>
  <g class="venue-build">
    <rect class="venue-base" x="40" y="70" width="120" height="60"/>
    <polygon class="venue-roof" points="30,70 100,30 170,70"/>
    <rect class="venue-door" x="85" y="90" width="30" height="40"/>
    <rect class="venue-window" x="55" y="85" width="20" height="20"/>
    <rect class="venue-window" x="125" y="85" width="20" height="20"/>
    <line class="venue-window" x1="65" y1="85" x2="65" y2="105"/>
    <line class="venue-window" x1="55" y1="95" x2="75" y2="95"/>
    <line class="venue-window" x1="135" y1="85" x2="135" y2="105"/>
    <line class="venue-window" x1="125" y1="95" x2="145" y2="95"/>
  </g>
  <g class="venue-q-group" transform="translate(100, 20)">
    <circle class="venue-q-circle" cx="0" cy="-10" r="16"/>
    <text class="venue-q-text" x="0" y="-2" text-anchor="middle">?</text>
  </g>
</svg>
            </div>
            <h3 id="venue-title" style="text-align: center; color: #ffc107;"></h3>
            <p id="venue-desc" style="text-align: center;"></p>
        </section>

        <section id="community" style="text-align: center;">
            <h3 id="comm-title" style="font-size: 2rem;"></h3>
            <p id="comm-desc"></p>
            <p id="comm-bots" style="color: #ffc107; margin-bottom: 30px;"></p>
            <a href="#" id="comm-btn" class="btn" style="font-size: 1.3rem; padding: 15px 40px;"></a>
        </section>

        <section id="links-and-faq" style="text-align: center;">
            <h3 id="reg-title"></h3>
            <p id="reg-warn" style="margin-bottom: 15px; color: #ff6b6b; font-weight: bold;"></p>
            <p id="reg-desc" style="margin-bottom: 25px; max-width: 600px; margin-left: auto; margin-right: auto;"></p>
            <p>
                <a href="#" id="reg-luma" class="btn" style="background: rgba(255,255,255,0.1); border: 1px solid #ff6b6b; margin: 0 10px;"></a>
                <a href="#" id="reg-meetup" class="btn" style="background: rgba(255,255,255,0.1); border: 1px solid #e94560; margin: 0 10px;"></a>
            </p>
            <div id="faq-container" style="text-align: left; max-width: 500px; margin: 40px auto 0;">
            </div>
        </section>

        <footer>
            <p id="footer-tagline"></p>
            <p id="footer-credits" style="margin-top: 10px;"></p>
        </footer>

    </div>

    <!-- Load external content -->
    <script src="content.js"></script>
    <script>
        // Populate DOM linearly from JSON file
        document.getElementById('hero-date').innerHTML = content.hero.dateBadge;
        document.getElementById('hero-title').innerHTML = content.hero.title;
        document.getElementById('hero-tagline').innerHTML = content.hero.tagline;
        document.getElementById('hero-subtitle').innerHTML = content.hero.subtitle;

        document.getElementById('event-title').innerHTML = content.eventDetails.title;
        document.getElementById('event-desc').innerHTML = content.eventDetails.description;
        document.getElementById('event-loc').innerHTML = content.eventDetails.location;
        document.getElementById('event-time').innerHTML = content.eventDetails.time;
        document.getElementById('agenda-title').innerHTML = content.eventDetails.agendaTitle;
        document.getElementById('agenda-list').innerHTML = content.eventDetails.agendaItems.map(item => `<li style="margin-bottom: 15px;">${item}</li>`).join('');

        document.getElementById('speakers-title').innerHTML = content.speakers.title;
        document.getElementById('speakers-desc').innerHTML = content.speakers.description;
        document.getElementById('speakers-btn').innerHTML = content.speakers.btnText;
        document.getElementById('speakers-btn').href = content.speakers.btnLink;

        document.getElementById('host-title').innerHTML = content.host.title;
        document.getElementById('host-bio').innerHTML = content.host.bioIntro;
        document.getElementById('host-list-title').innerHTML = content.host.listTitle;
        document.getElementById('host-list').innerHTML = content.host.listItems.map(item => `<li>${item}</li>`).join('');


        document.getElementById('coorg-title').innerHTML = content.coOrganize.title;
        document.getElementById('coorg-desc').innerHTML = content.coOrganize.description;

        document.getElementById('venue-title').innerHTML = content.venue.title;
        document.getElementById('venue-desc').innerHTML = content.venue.description;

        document.getElementById('comm-title').innerHTML = content.community.title;
        document.getElementById('comm-desc').innerHTML = content.community.description;
        document.getElementById('comm-bots').innerHTML = content.community.botsWelcome;
        document.getElementById('comm-btn').innerHTML = content.community.btnText;
        document.getElementById('comm-btn').href = content.community.btnLink;

        document.getElementById('reg-title').innerHTML = content.registration.title;
        document.getElementById('reg-warn').innerHTML = content.registration.warning;
        document.getElementById('reg-desc').innerHTML = content.registration.description;
        document.getElementById('reg-luma').innerHTML = content.registration.lumaBtn;
        document.getElementById('reg-luma').href = content.registration.lumaLink;
        document.getElementById('reg-meetup').innerHTML = content.registration.meetupBtn;
        document.getElementById('reg-meetup').href = content.registration.meetupLink;

        document.getElementById('faq-container').innerHTML = content.registration.faq.map(item => `
            <details>
                <summary>${item.q}</summary>
                <p style="margin-top: 5px; font-size: 1rem;">${item.a}</p>
            </details>
        `).join('');

        document.getElementById('footer-tagline').innerHTML = content.footer.tagline;
        document.getElementById('footer-credits').innerHTML = content.footer.creditsHTML;
    </script>
</body>
</html>
