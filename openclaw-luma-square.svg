<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="sky-glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g fill="#ffffff" opacity="0.025">
    <circle cx="80" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="240" cy="80" r="1.5"/><circle cx="320" cy="80" r="1.5"/><circle cx="400" cy="80" r="1.5"/><circle cx="480" cy="80" r="1.5"/><circle cx="560" cy="80" r="1.5"/><circle cx="640" cy="80" r="1.5"/><circle cx="720" cy="80" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="240" cy="160" r="1.5"/><circle cx="320" cy="160" r="1.5"/><circle cx="400" cy="160" r="1.5"/><circle cx="480" cy="160" r="1.5"/><circle cx="560" cy="160" r="1.5"/><circle cx="640" cy="160" r="1.5"/><circle cx="720" cy="160" r="1.5"/>
    <circle cx="80" cy="720" r="1.5"/><circle cx="160" cy="720" r="1.5"/><circle cx="240" cy="720" r="1.5"/><circle cx="320" cy="720" r="1.5"/><circle cx="400" cy="720" r="1.5"/><circle cx="480" cy="720" r="1.5"/><circle cx="560" cy="720" r="1.5"/><circle cx="640" cy="720" r="1.5"/><circle cx="720" cy="720" r="1.5"/>
  </g>

  <!-- Prague skyline silhouette at bottom -->
  <g fill="#0d0d1a" opacity="0.6">
    <!-- Charles Bridge tower left -->
    <rect x="60" y="560" width="40" height="140"/>
    <rect x="55" y="550" width="50" height="15" rx="2"/>
    <polygon points="65,550 80,520 95,550"/>
    <rect x="76" y="525" width="8" height="10"/>
    <!-- Bridge arches -->
    <path d="M100,700 Q130,660 160,700 Q190,660 220,700 Q250,660 280,700 Q310,660 340,700 Q370,660 400,700" fill="none" stroke="#0d0d1a" stroke-width="12"/>
    <rect x="100" y="688" width="300" height="12"/>
    <!-- Tyn Church left spire -->
    <rect x="180" y="530" width="20" height="170"/>
    <polygon points="175,530 190,470 205,530"/>
    <circle cx="190" cy="475" r="6" fill="none" stroke="#0d0d1a" stroke-width="2"/>
    <!-- Tyn Church right spire -->
    <rect x="230" y="540" width="20" height="160"/>
    <polygon points="225,540 240,480 255,540"/>
    <circle cx="240" cy="485" r="6" fill="none" stroke="#0d0d1a" stroke-width="2"/>
    <!-- Tyn Church body -->
    <rect x="195" y="580" width="40" height="120"/>
    <!-- St Vitus Cathedral -->
    <rect x="420" y="500" width="60" height="200"/>
    <polygon points="415,500 450,410 485,500"/>
    <rect x="445" y="415" width="10" height="20"/>
    <!-- Flying buttresses hint -->
    <path d="M420,550 L395,620" stroke="#0d0d1a" stroke-width="6" fill="none"/>
    <path d="M480,550 L505,620" stroke="#0d0d1a" stroke-width="6" fill="none"/>
    <!-- Prague Castle wall -->
    <rect x="380" y="600" width="180" height="100"/>
    <!-- Castle crenellations -->
    <rect x="380" y="590" width="15" height="15"/><rect x="405" y="590" width="15" height="15"/><rect x="430" y="590" width="15" height="15"/><rect x="455" y="590" width="15" height="15"/><rect x="480" y="590" width="15" height="15"/><rect x="505" y="590" width="15" height="15"/><rect x="530" y="590" width="15" height="15"/><rect x="545" y="590" width="15" height="15"/>
    <!-- Petrin Tower (mini Eiffel) -->
    <polygon points="620,690 640,440 660,690" fill="none" stroke="#0d0d1a" stroke-width="4"/>
    <line x1="625" y1="600" x2="655" y2="600" stroke="#0d0d1a" stroke-width="3"/>
    <line x1="630" y1="540" x2="650" y2="540" stroke="#0d0d1a" stroke-width="3"/>
    <line x1="635" y1="480" x2="645" y2="480" stroke="#0d0d1a" stroke-width="2"/>
    <!-- Random buildings right -->
    <rect x="680" y="580" width="35" height="120"/>
    <rect x="720" y="560" width="30" height="140"/>
    <rect x="755" y="590" width="45" height="110"/>
    <!-- Ground line -->
    <rect x="0" y="695" width="800" height="105"/>
  </g>

  <!-- Glow behind skyline -->
  <rect x="0" y="400" width="800" height="400" fill="url(#sky-glow)"/>

  <!-- Glow behind mascot -->
  <circle cx="400" cy="290" r="160" fill="#e94560" opacity="0.06"/>
  <circle cx="400" cy="290" r="100" fill="#ff6b6b" opacity="0.04"/>

  <!-- Pixel Cat Mascot centered -->
  <g transform="translate(280, 180) scale(8)" shape-rendering="crispEdges">
    <path fill="#e94560" d="M5,10 h4 v-4 h4 v4 h4 v-4 h4 v4 h4 v10 h-20 Z" />
    <path fill="#ff6b6b" d="M7,12 h2 v2 h-2 Z M17,12 h2 v2 h-2 Z M12,16 h2 v2 h-2 Z" />
    <rect fill="#fff" x="6" y="12" width="4" height="4" />
    <rect fill="#a0a0a0" x="7" y="13" width="2" height="2" />
    <rect fill="#fff" x="16" y="12" width="4" height="4" />
    <rect fill="#a0a0a0" x="17" y="13" width="2" height="2" />
    <path fill="#fff" d="M6,21 h2 v4 h-2 Z M11,21 h2 v4 h-2 Z M16,21 h2 v4 h-2 Z M21,21 h2 v4 h-2 Z" />
  </g>

  <!-- Title -->
  <text x="400" y="470" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="64" fill="url(#title-grad)" text-anchor="middle">OpenClaw</text>

  <!-- Subtitle -->
  <text x="400" y="520" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-weight="600" font-size="28" fill="#ff6b6b" text-anchor="middle">Prague Meetup #1</text>

  <!-- Date -->
  <rect x="250" y="545" width="300" height="44" rx="22" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>
  <text x="400" y="574" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="20" fill="#ff6b6b" text-anchor="middle">March 26, 2026 · 18:00 CET</text>

  <!-- Tagline -->
  <text x="400" y="630" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="18" fill="#a0a0a0" text-anchor="middle">The AI meetup that doesn't suck</text>

  <!-- Bottom accent -->
  <rect x="0" y="792" width="800" height="8" fill="url(#title-grad)" opacity="0.4"/>
</svg>
