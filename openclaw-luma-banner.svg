<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g fill="#ffffff" opacity="0.03">
    <circle cx="100" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="400" cy="100" r="2"/><circle cx="500" cy="100" r="2"/>
    <circle cx="600" cy="100" r="2"/><circle cx="700" cy="100" r="2"/><circle cx="800" cy="100" r="2"/><circle cx="900" cy="100" r="2"/><circle cx="1000" cy="100" r="2"/><circle cx="1100" cy="100" r="2"/>
    <circle cx="100" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="400" cy="200" r="2"/><circle cx="500" cy="200" r="2"/>
    <circle cx="600" cy="200" r="2"/><circle cx="700" cy="200" r="2"/><circle cx="800" cy="200" r="2"/><circle cx="900" cy="200" r="2"/><circle cx="1000" cy="200" r="2"/><circle cx="1100" cy="200" r="2"/>
    <circle cx="100" cy="300" r="2"/><circle cx="200" cy="300" r="2"/><circle cx="300" cy="300" r="2"/><circle cx="400" cy="300" r="2"/><circle cx="500" cy="300" r="2"/>
    <circle cx="600" cy="300" r="2"/><circle cx="700" cy="300" r="2"/><circle cx="800" cy="300" r="2"/><circle cx="900" cy="300" r="2"/><circle cx="1000" cy="300" r="2"/><circle cx="1100" cy="300" r="2"/>
    <circle cx="100" cy="400" r="2"/><circle cx="200" cy="400" r="2"/><circle cx="300" cy="400" r="2"/><circle cx="400" cy="400" r="2"/><circle cx="500" cy="400" r="2"/>
    <circle cx="600" cy="400" r="2"/><circle cx="700" cy="400" r="2"/><circle cx="800" cy="400" r="2"/><circle cx="900" cy="400" r="2"/><circle cx="1000" cy="400" r="2"/><circle cx="1100" cy="400" r="2"/>
    <circle cx="100" cy="500" r="2"/><circle cx="200" cy="500" r="2"/><circle cx="300" cy="500" r="2"/><circle cx="400" cy="500" r="2"/><circle cx="500" cy="500" r="2"/>
    <circle cx="600" cy="500" r="2"/><circle cx="700" cy="500" r="2"/><circle cx="800" cy="500" r="2"/><circle cx="900" cy="500" r="2"/><circle cx="1000" cy="500" r="2"/><circle cx="1100" cy="500" r="2"/>
    <circle cx="100" cy="600" r="2"/><circle cx="200" cy="600" r="2"/><circle cx="300" cy="600" r="2"/><circle cx="400" cy="600" r="2"/><circle cx="500" cy="600" r="2"/>
    <circle cx="600" cy="600" r="2"/><circle cx="700" cy="600" r="2"/><circle cx="800" cy="600" r="2"/><circle cx="900" cy="600" r="2"/><circle cx="1000" cy="600" r="2"/><circle cx="1100" cy="600" r="2"/>
  </g>

  <!-- Glow behind mascot -->
  <circle cx="250" cy="340" r="150" fill="#e94560" opacity="0.06"/>
  <circle cx="250" cy="340" r="100" fill="#e94560" opacity="0.04"/>

  <!-- Pixel Cat Mascot (scaled up) -->
  <g transform="translate(130, 200) scale(8)" shape-rendering="crispEdges">
    <path fill="#e94560" d="M5,10 h4 v-4 h4 v4 h4 v-4 h4 v4 h4 v10 h-20 Z" />
    <path fill="#ff6b6b" d="M7,12 h2 v2 h-2 Z M17,12 h2 v2 h-2 Z M12,16 h2 v2 h-2 Z" />
    <rect fill="#fff" x="6" y="12" width="4" height="4" />
    <rect fill="#a0a0a0" x="7" y="13" width="2" height="2" />
    <rect fill="#fff" x="16" y="12" width="4" height="4" />
    <rect fill="#a0a0a0" x="17" y="13" width="2" height="2" />
    <path fill="#fff" d="M6,21 h2 v4 h-2 Z M11,21 h2 v4 h-2 Z M16,21 h2 v4 h-2 Z M21,21 h2 v4 h-2 Z" />
  </g>

  <!-- Title text -->
  <text x="520" y="230" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="url(#title-grad)">OpenClaw</text>
  <text x="520" y="310" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="url(#title-grad)">Prague</text>

  <!-- Subtitle -->
  <text x="520" y="365" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="600" font-size="30" fill="#ff6b6b">Meetup #1</text>

  <!-- Tagline -->
  <text x="520" y="415" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="400" font-size="22" fill="#a0a0a0">The AI meetup that doesn't suck 🐱</text>

  <!-- Date badge -->
  <rect x="520" y="450" width="320" height="50" rx="25" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <text x="680" y="482" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#ff6b6b" text-anchor="middle">March 26, 2026 · 18:00 CET</text>

  <!-- Location -->
  <text x="520" y="545" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="400" font-size="20" fill="#666">📍 Prague, Czech Republic</text>

  <!-- Bottom accent line -->
  <rect x="0" y="665" width="1200" height="10" fill="url(#title-grad)" opacity="0.5"/>
</svg>
